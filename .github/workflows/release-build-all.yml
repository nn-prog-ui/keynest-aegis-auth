name: aegis-release-build-all

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "internal / production"
        required: false
        default: "internal"
        type: string

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  android:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Restore Android Firebase config
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import pathlib
          import re

          raw = (os.environ.get("FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64") or "").strip()
          if not raw:
              print("Android Firebase secret is empty. Continue without google-services.json.")
              raise SystemExit(0)

          def write_json_bytes(payload: bytes) -> bool:
              try:
                  obj = json.loads(payload.decode("utf-8"))
              except Exception:
                  return False
              if "project_info" not in obj or "client" not in obj:
                  return False
              path = pathlib.Path("android/app/google-services.json")
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(json.dumps(obj, ensure_ascii=False, indent=2), encoding="utf-8")
              print(f"Restored {path}")
              return True

          # Case 1: secret pasted as raw JSON text
          if "project_info" in raw and "client" in raw and "{" in raw and "}" in raw:
              start = raw.find("{")
              end = raw.rfind("}")
              if start >= 0 and end > start:
                  if write_json_bytes(raw[start:end + 1].encode("utf-8")):
                      raise SystemExit(0)

          # Case 2: secret pasted as base64 (possibly with extra surrounding text)
          candidates = []
          candidates.append(raw)
          candidates.extend(re.findall(r"[A-Za-z0-9+/=_-]{80,}", raw))

          seen = set()
          for candidate in sorted(candidates, key=len, reverse=True):
              token = re.sub(r"\s+", "", candidate)
              if not token or token in seen:
                  continue
              seen.add(token)
              token = token.replace("-", "+").replace("_", "/")
              token += "=" * (-len(token) % 4)
              try:
                  decoded = base64.b64decode(token, validate=False)
              except Exception:
                  continue
              if write_json_bytes(decoded):
                  raise SystemExit(0)

          print("Could not decode valid android google-services.json from secret. Continue without it.")
          raise SystemExit(0)
          PY
      - name: Restore Android signing config
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_UPLOAD_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_UPLOAD_KEY_ALIAS}" ] || [ -z "${ANDROID_UPLOAD_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_UPLOAD_KEY_PASSWORD}" ]; then
            echo "Android signing secrets are missing."
            exit 1
          fi

          mkdir -p android/app
          printf '%s' "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=${ANDROID_UPLOAD_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_UPLOAD_KEY_PASSWORD}
          keyAlias=${ANDROID_UPLOAD_KEY_ALIAS}
          storeFile=app/upload-keystore.jks
          EOF

          echo "Restored Android signing config."
      - run: flutter pub get
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: aegis-android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  ios:
    runs-on: macos-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Restore iOS Firebase config
        env:
          FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import os
          import pathlib
          import re

          raw = (os.environ.get("FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64") or "").strip()
          if not raw:
              print("iOS Firebase secret is empty. Continue without GoogleService-Info.plist.")
              raise SystemExit(0)

          def write_plist_bytes(payload: bytes) -> bool:
              text = payload.decode("utf-8", errors="ignore")
              if "<plist" not in text or "</plist>" not in text or "<dict>" not in text:
                  return False
              start = text.find("<?xml")
              if start < 0:
                  start = text.find("<plist")
              end = text.rfind("</plist>")
              if start < 0 or end <= start:
                  return False
              content = text[start:end + len("</plist>")]
              path = pathlib.Path("ios/Runner/GoogleService-Info.plist")
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding="utf-8")
              print(f"Restored {path}")
              return True

          # Case 1: secret pasted as raw plist text
          if "<plist" in raw and "</plist>" in raw:
              if write_plist_bytes(raw.encode("utf-8")):
                  raise SystemExit(0)

          # Case 2: secret pasted as base64 (possibly with extra surrounding text)
          candidates = []
          candidates.append(raw)
          candidates.extend(re.findall(r"[A-Za-z0-9+/=_-]{80,}", raw))

          seen = set()
          for candidate in sorted(candidates, key=len, reverse=True):
              token = re.sub(r"\s+", "", candidate)
              if not token or token in seen:
                  continue
              seen.add(token)
              token = token.replace("-", "+").replace("_", "/")
              token += "=" * (-len(token) % 4)
              try:
                  decoded = base64.b64decode(token, validate=False)
              except Exception:
                  continue
              if write_plist_bytes(decoded):
                  raise SystemExit(0)

          print("Could not decode valid iOS GoogleService-Info.plist from secret. Continue without it.")
          raise SystemExit(0)
          PY
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: aegis-ios-app-unsigned
          path: build/ios/iphoneos

  macos:
    runs-on: macos-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: aegis-macos-app
          path: build/macos/Build/Products/Release

  windows:
    runs-on: windows-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: aegis-windows-release
          path: build/windows/x64/runner/Release
