name: aegis-release-build-all

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "internal / production"
        required: false
        default: "internal"
        type: string

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  android:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Restore Android Firebase config
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import os
          import pathlib
          import re

          raw = (os.environ.get("FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64") or "").strip()
          if not raw:
              print("Android Firebase secret is empty. Skipping restore.")
              raise SystemExit(0)

          tokens = re.findall(r"[A-Za-z0-9+/=_-]+", raw)
          if not tokens:
              raise SystemExit("Android Firebase secret does not contain a base64 token.")

          token = max(tokens, key=len).replace("-", "+").replace("_", "/")
          token += "=" * (-len(token) % 4)
          data = base64.b64decode(token, validate=False)

          if b'"project_info"' not in data or b'"client"' not in data:
              raise SystemExit("Decoded Android Firebase config looks invalid.")

          path = pathlib.Path("android/app/google-services.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_bytes(data)
          print(f"Restored {path}")
          PY
      - run: flutter pub get
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: aegis-android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  ios:
    runs-on: macos-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Restore iOS Firebase config
        env:
          FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import os
          import pathlib
          import re

          raw = (os.environ.get("FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64") or "").strip()
          if not raw:
              print("iOS Firebase secret is empty. Skipping restore.")
              raise SystemExit(0)

          tokens = re.findall(r"[A-Za-z0-9+/=_-]+", raw)
          if not tokens:
              raise SystemExit("iOS Firebase secret does not contain a base64 token.")

          token = max(tokens, key=len).replace("-", "+").replace("_", "/")
          token += "=" * (-len(token) % 4)
          data = base64.b64decode(token, validate=False)

          if b"<plist" not in data or b"<dict>" not in data:
              raise SystemExit("Decoded iOS Firebase config looks invalid.")

          path = pathlib.Path("ios/Runner/GoogleService-Info.plist")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_bytes(data)
          print(f"Restored {path}")
          PY
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: aegis-ios-app-unsigned
          path: build/ios/iphoneos

  macos:
    runs-on: macos-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: aegis-macos-app
          path: build/macos/Build/Products/Release

  windows:
    runs-on: windows-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: aegis-windows-release
          path: build/windows/x64/runner/Release
