name: aegis-desktop-build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos
            output: build/macos
          - os: windows-latest
            target: windows
            output: build/windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Build desktop
        run: flutter build ${{ matrix.target }} --release
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aegis-${{ matrix.target }}-release
          path: ${{ matrix.output }}
