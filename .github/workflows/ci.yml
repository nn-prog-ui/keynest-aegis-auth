name: aegis-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Flutter deps
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Test
        run: flutter test

  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend deps
        working-directory: server
        run: npm ci
      - name: Start backend
        working-directory: server
        run: |
          node index.js &
          echo $! > /tmp/venemo_server.pid
      - name: Health check
        run: |
          sleep 2
          curl --fail http://localhost:3000/api/health
      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/venemo_server.pid ]; then
            kill "$(cat /tmp/venemo_server.pid)" || true
          fi
