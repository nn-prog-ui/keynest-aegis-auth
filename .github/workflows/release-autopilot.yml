name: keynest-release-autopilot

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      phase:
        description: "phase1 / phase2 / phase3 / phase4 (empty: auto by date)"
        required: false
        type: string
      timezone:
        description: "Timezone for auto phase routing"
        required: false
        default: "Asia/Tokyo"
        type: string

jobs:
  run-autopilot:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore Firebase config files
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
          FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -n "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64}" ]; then
            echo "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64}" | base64 --decode > android/app/google-services.json
          fi
          if [ -n "${FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64}" ]; then
            echo "${FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64}" | base64 --decode > ios/Runner/GoogleService-Info.plist
          fi

      - name: Prepare dependencies
        run: |
          flutter pub get
          cd server && npm ci

      - name: Run selected phase
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.phase != '' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          chmod +x scripts/release/autopilot.sh
          scripts/release/autopilot.sh "${{ github.event.inputs.phase }}"

      - name: Run phase by date
        if: ${{ github.event_name == 'schedule' || github.event.inputs.phase == '' }}
        env:
          TZ_REGION: ${{ github.event.inputs.timezone }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          chmod +x scripts/release/autopilot.sh scripts/release/autopilot_by_date.sh
          scripts/release/autopilot_by_date.sh

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keynest-release-reports
          path: docs/release/reports
          if-no-files-found: ignore
